name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
      - run: uvx ruff check src/ tests/
      - run: uvx ruff format --check src/ tests/

  type:
    # ty check is now blocking — baseline cleared 2026-05-01 (5 → 0).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run ty check

  test:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
      - run: uv run --extra dev --python ${{ matrix.python-version }} pytest tests/ -v

  smoke-test:
    runs-on: macos-latest
    needs: [lint, type, test]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
      - name: Install package
        run: uv sync --extra dev

      - name: Verify CLI entry point
        run: |
          uv run mlx-forge --help
          uv run mlx-forge --version

      - name: Verify subcommand help
        run: |
          uv run mlx-forge convert --help
          uv run mlx-forge validate --help
          uv run mlx-forge split --help
          uv run mlx-forge quantize --help
          uv run mlx-forge upload --help

      - name: Verify recipe dry-run (no network, no GPU)
        run: |
          uv run mlx-forge convert ltx-2.3 --dry-run
          uv run mlx-forge convert fish-s2-pro --dry-run

  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed  # v6.2.1
