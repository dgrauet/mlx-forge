name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Use a fine-grained PAT (not the default GITHUB_TOKEN) so the release
          # PR it opens triggers CI/relock workflows. Pushes made with the default
          # token cannot trigger other workflows (GitHub loop prevention), which
          # leaves the release PR's checks stuck in "action_required".
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
