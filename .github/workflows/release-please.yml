name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v4
        with:
          # Mint a short-lived token from the release GitHub App (not the default
          # GITHUB_TOKEN) so the release PR it opens triggers CI/relock workflows.
          # Pushes made with the default token cannot trigger other workflows
          # (GitHub loop prevention), which leaves the release PR's checks stuck
          # in "action_required".
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
